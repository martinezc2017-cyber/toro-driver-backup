workflows:

  # ── iOS App Store Build ────────────────────────────────────────────────────
  ios-release:
    name: TORO Driver — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.41.1
      xcode: latest
      cocoapods: default
      groups:
        - apple_credentials
      vars:
        BUNDLE_ID: com.tororide.driver

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Fetch signing files
        script: |
          keychain initialize
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode > /tmp/AuthKey.p8

          # Use stored cert key if available, otherwise generate and print for saving
          if [ -n "$CERT_PRIVATE_KEY" ]; then
            echo "$CERT_PRIVATE_KEY" | base64 --decode > /tmp/cert_key.pem
            echo "Using stored certificate private key"
          else
            openssl genrsa -out /tmp/cert_key.pem 2048
            echo "=== SAVE THIS KEY AS CERT_PRIVATE_KEY ENV VAR (base64) ==="
            base64 < /tmp/cert_key.pem | tr -d '\n'
            echo ""
            echo "=== END KEY ==="
          fi

          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$(cat /tmp/cert_key.pem)" \
            --private-key "$(cat /tmp/AuthKey.p8)" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
          keychain add-certificates

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update

      - name: Build number unico desde App Store Connect (fallback seguro)
        script: |
          # Toma el ultimo build number de ASC y suma 1 -> NUNCA duplicado.
          # Triple seguridad: usa $APP_STORE_APP_ID si esta seteado; si no, lo
          # resuelve por bundle id; y si CUALQUIER paso falla, NO setea
          # BUILD_NUMBER y el build usa el numero del pubspec (no se rompe).
          set +e
          APP_ID="$APP_STORE_APP_ID"
          if [ -z "$APP_ID" ]; then
            APP_ID=$(app-store-connect list-apps --bundle-id-identifier "$BUNDLE_ID" --json 2>/dev/null \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print(d[0]['id'] if d else '')" 2>/dev/null)
          fi
          if [ -n "$APP_ID" ]; then
            # MAX de TestFlight y App Store (el mas alto YA subido) + 1.
            TF=$(app-store-connect get-latest-testflight-build-number "$APP_ID" 2>/dev/null)
            AS=$(app-store-connect get-latest-app-store-build-number "$APP_ID" 2>/dev/null)
            echo "$TF" | grep -qE '^[0-9]+$' || TF=0
            echo "$AS" | grep -qE '^[0-9]+$' || AS=0
            MAX=$TF; [ "$AS" -gt "$MAX" ] && MAX=$AS
            if [ "$MAX" -gt 0 ]; then
              echo "BUILD_NUMBER=$((MAX + 1))" >> "$CM_ENV"
              echo "==> Build number automatico: $((MAX + 1)) (TestFlight=$TF, AppStore=$AS)"
            fi
          fi
          [ -z "$BUILD_NUMBER" ] && echo "==> Sin auto-incremento; se usa el del pubspec (no rompe el build)."
          true

      - name: Apply profiles and build IPA
        script: |
          xcode-project use-profiles
          if [ -n "$BUILD_NUMBER" ]; then
            flutter build ipa --release --build-number=$BUILD_NUMBER \
              --export-options-plist=$HOME/export_options.plist
          else
            flutter build ipa --release \
              --export-options-plist=$HOME/export_options.plist
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
